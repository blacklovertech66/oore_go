name: oore_flutter
description: Sovereign local-developer flow SDK. Turn any Flutter project into an Oore Dev Server with mDNS discovery, WebSocket gateway, and hot bytecode push.
version: 1.0.0
homepage: https://oore.dev
repository: https://github.com/oore/oore_flutter
publish_to: 'none'

environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: ">=3.41.7"

executables:
  oore: serve

dependencies:
  flutter:
    sdk: flutter
  # WebSocket server
  shelf: ^1.4.2
  shelf_web_socket: ^3.0.0
  web_socket_channel: ^3.0.3

  # dart_eval bytecode compiler (Synced with launcher)
  dart_eval: ^0.8.4

  # File watching
  watcher: ^1.2.1

  # Auth & crypto
  crypto: ^3.0.7
  uuid: ^4.5.3

  # Delta compression
  archive: ^4.0.9

  # CLI
  args: ^2.7.0

  # Utilities
  yaml: ^3.1.3
  path: ^1.9.1
  ansi_styles: ^0.3.2+1
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.0
  mockito: ^5.6.4
  build_runner: ^2.13.1

dependency_overrides:
  meta: ^1.18.2